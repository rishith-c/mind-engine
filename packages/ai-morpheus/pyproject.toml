[project]
name = "ai-morpheus"
version = "0.1.0"
description = "Morpheus — synesthetic 3D Neural Cellular Automaton (geometry + color + per-cell audio)"
requires-python = ">=3.11"
dependencies = [
    "numpy>=2.1",
    "torch>=2.5",
    "scipy>=1.14",
]

[project.optional-dependencies]
dev = ["pytest>=8.3", "ruff>=0.7"]
api = ["fastapi>=0.115", "uvicorn>=0.32", "pydantic>=2.9"]

[build-system]
requires = ["setuptools>=70"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["morpheus"]
